# Modelo que Codex usará de forma predeterminada para las tareas.
model = "gpt-5.6-sol"
# Esfuerzo de razonamiento: medium equilibra velocidad y profundidad de análisis.
model_reasoning_effort = "medium"
# Estilo de comunicación predeterminado; cambia el tono, no las capacidades del modelo.
personality = "pragmatic"
# Nivel de detalle de las respuestas; low produce respuestas más breves en proveedores Responses API.
model_verbosity = "low"
# Grado de detalle del resumen visible del razonamiento generado por el modelo.
model_reasoning_summary = "concise"

# Controla cuándo Codex solicita aprobación antes de ejecutar acciones.
# approval_policy = "on-request"
# Limita las escrituras al workspace y mantiene aislado el resto del sistema.
# sandbox_mode = "workspace-write"

