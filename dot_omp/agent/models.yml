# Custom model providers exposed by the local CLI proxy.
providers:
  # OpenAI-compatible endpoint for GPT and Codex models.
  tunnel-agent-cliproxy:
    # OpenAI-compatible API root served by the local proxy.
    baseUrl: http://127.0.0.1:8317/v1
    # Placeholder credential required by the provider schema.
    apiKey: no-key
    # Send requests through the Chat Completions-compatible transport.
    api: openai-completions
    # Send the placeholder credential as an Authorization bearer token.
    authHeader: true
    # Models explicitly registered under this provider.
    models:
      # Specialized model used for automated code-review workflows.
      - id: codex-auto-review
        # Human-readable label shown by model selectors.
        name: Codex Auto Review
        # Model supports configurable reasoning effort.
        reasoning: true
        # Accepted input modalities.
        input: [text]
        # Maximum combined input and output context in tokens.
        contextWindow: 272000
        # Maximum generated output in tokens.
        maxTokens: 128000

      # Small and economical GPT model for lightweight work.
      - id: gpt-5.4-mini
        name: GPT-5.4 Mini
        reasoning: true
        input: [text, image]
        contextWindow: 400000
        maxTokens: 128000

      # Previous GPT flagship retained as an alternative.
      - id: gpt-5.5
        name: GPT-5.5
        reasoning: true
        input: [text, image]
        contextWindow: 1050000
        maxTokens: 128000

      # Fastest and most economical GPT-5.6 tier.
      - id: gpt-5.6-luna
        name: GPT-5.6 Luna
        reasoning: true
        input: [text, image]
        contextWindow: 1050000
        maxTokens: 128000

      # Highest-capability GPT-5.6 tier.
      - id: gpt-5.6-sol
        name: GPT-5.6 Sol
        reasoning: true
        input: [text, image]
        contextWindow: 1050000
        maxTokens: 128000

      # Balanced GPT-5.6 tier for cost-sensitive substantial work.
      - id: gpt-5.6-terra
        name: GPT-5.6 Terra
        reasoning: true
        input: [text, image]
        contextWindow: 1050000
        maxTokens: 128000

  # Anthropic Messages-compatible endpoint for Claude models.
  tunnel-agent-cliproxy-anthropic:
    # Base host; Anthropic transport appends the Messages API path.
    baseUrl: http://127.0.0.1:8317
    # Placeholder credential required by the provider schema.
    apiKey: no-key
    # Send requests using the Anthropic Messages wire format.
    api: anthropic-messages
    # Proxy does not support Anthropic strict tool-schema markers.
    disableStrictTools: true
    # Models explicitly registered under this provider.
    models:
      # Fast Claude model for small tasks and commit generation.
      - id: claude-haiku-4-5-20251001
        name: Claude Haiku 4.5
        reasoning: true
        input: [text, image]
        contextWindow: 200000
        maxTokens: 64000

      # Balanced Claude model with high speed and strong capability.
      - id: claude-sonnet-5
        name: Claude Sonnet 5
        reasoning: true
        input: [text, image]
        contextWindow: 1000000
        maxTokens: 128000

      # Highest-capability Claude model for long-running agents.
      - id: claude-fable-5
        name: Claude Fable 5
        reasoning: true
        input: [text, image]
        contextWindow: 1000000
        maxTokens: 128000

      # Deep-reasoning Claude model for slow and advisor roles.
      - id: claude-opus-4-8
        name: Claude Opus 4.8
        reasoning: true
        input: [text, image]
        contextWindow: 1000000
        maxTokens: 128000
