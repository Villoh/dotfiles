[plugin]
prepend_preloaders = [
  # Replace magick, image, video with mediainfo
  { mime = "{audio,video,image}/*", run = "mediainfo" },
  { mime = "application/subrip", run = "mediainfo" },
  # Adobe Illustrator, Adobe Photoshop is image/adobe.photoshop, already handled above
  { mime = "application/postscript", run = "mediainfo" },
  
  # DuckDB Plugin
  # { url = "*.csv", run = "duckdb", multi = false },  
  # { url = "*.tsv", run = "duckdb", multi = false },  
  # { url = "*.json", run = "duckdb", multi = false },  
  # { url = "*.parquet", run = "duckdb", multi = false },
  # { url = "*.txt", run = "duckdb", multi = false },  
  # { url = "*.xlsx", run = "duckdb", multi = false }
]
prepend_previewers = [
  # Replace magick, image, video with mediainfo
  { mime = "{audio,video,image}/*", run = "mediainfo" },
  { mime = "application/subrip", run = "mediainfo" },
  # Adobe Illustrator, Adobe Photoshop is image/adobe.photoshop, already handled above
  { mime = "application/postscript", run = "mediainfo" },
  { url = "*.md", run = "rich-preview" }, # for markdown (.md) files
  { url = "*.ipynb", run = "rich-preview"}, # for jupyter notebooks (.ipynb)
  { url = "*.rst", run = "rich-preview"}, # for restructured text (.rst) files
  
  { url = "*.csv", run = "mux rich-preview code" }, # for json (.json) files
  { url = "*.tsv", run = "mux rich-preview code" }, # for Tab Separated Values (.tsv) files
  { url = "*.json", run = "mux rich-preview code" }, # for json (.json) files
]

[tasks]
image_alloc = 1073741824

