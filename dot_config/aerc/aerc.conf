# ~/.config/aerc/aerc.conf

# ─────────────────────────────────────────────
# [general]
# ─────────────────────────────────────────────
[general]
pgp-provider=auto
unsafe-accounts-conf=false
default-save-path=~/Downloads
log-level=warn
term=xterm-kitty

# ─────────────────────────────────────────────
# [ui]
# ─────────────────────────────────────────────
[ui]
index-columns=flags:4,name<20%,subject,date>=

timestamp-format=2006-01-02
this-day-time-format=15:04
this-week-time-format=Mon 15:04
this-year-time-format=Jan 02

sidebar-width=26
empty-message=(no messages)
empty-dirlist=(no folders)
empty-subject=(no subject)

mouse-enabled=true
new-message-bell=true

sort=date
threading-enabled=true
force-client-threads=false
threading-by-subject=false
sort-thread-siblings=true

dirlist-left={{.Folder}}
dirlist-right={{if .Unread}}{{humanReadable .Unread}}{{end}}
dirlist-delay=200ms
dirlist-tree=false

next-message-on-delete=true
auto-mark-read=true
fuzzy-complete=true

# Borders
border-char-vertical=│
border-char-horizontal=─

# Styleset
styleset-name=catppuccin-mocha.txt

# Icons
icon-attachment=
icon-new=󰇮
icon-old=󰇰
icon-replied=
icon-forwarded=
icon-flagged=
icon-draft=
icon-deleted=

thread-prefix-tip=""
thread-prefix-indent=""
thread-prefix-stem=│
thread-prefix-limb=─
thread-prefix-folded=+
thread-prefix-unfolded=""
thread-prefix-first-child=┬
thread-prefix-has-siblings=├
thread-prefix-orphan=┌
thread-prefix-dummy=┬
thread-prefix-lone=" "
thread-prefix-last-sibling=╰

# ─────────────────────────────────────────────
# [statusline]
# ─────────────────────────────────────────────
[statusline]
status-columns=left<*,center>=,right>*
column-left=[{{.Account}}] {{.StatusInfo}}
column-center={{.PendingKeys}}
column-right={{.TrayInfo}} | {{cwd}}

# ─────────────────────────────────────────────
# [viewer]
# ─────────────────────────────────────────────
[viewer]
; pager=less -Rc
alternatives=text/html, text/plain
show-headers=false
header-layout=From|To,Cc|Bcc,Date,Subject
always-show-mime=false
parse-http-links=true

# ─────────────────────────────────────────────
# [compose]
# ─────────────────────────────────────────────
[compose]
editor=
header-layout=To|From,Cc,Bcc,Subject
reply-to-self=false
empty-subject-warning=true
no-attachment-warning=^[^>]*(attach(ed|ment)|see attached|find attached)

# ─────────────────────────────────────────────
# [multipart-converters]
# ─────────────────────────────────────────────
[multipart-converters]
text/html=pandoc -f markdown -t html --standalone

# ─────────────────────────────────────────────
# [filters]
# ─────────────────────────────────────────────
[filters]
subject,~^\[PATCH=awk -f /usr/lib/aerc/filters/hldiff
text/html=pandoc -f html -t plain --standalone
text/plain=colorize
text/calendar=calendar
text/*=colorize
image/*=img2sixel
message/delivery-status=colorize
message/rfc822=colorize
.headers=colorize

# ─────────────────────────────────────────────
# [openers]
# ─────────────────────────────────────────────
[openers]
application/pdf=zathura
image/*=imv
x-scheme-handler/https=xdg-open
x-scheme-handler/http=xdg-open

# ─────────────────────────────────────────────
# [hooks]
# ─────────────────────────────────────────────
[hooks]
mail-received=notify-send "[$AERC_ACCOUNT] New mail from $AERC_FROM_NAME" "$AERC_SUBJECT"

# ─────────────────────────────────────────────
# [templates]
# ─────────────────────────────────────────────
[templates]
new-message=new_message
quoted-reply=quoted_reply
forwards=forward_as_body
