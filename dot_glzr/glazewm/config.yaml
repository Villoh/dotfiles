general:
  # startup_commands: ["shell-exec zebar"]
  # startup_commands: ["shell-exec yasb.exe"]
  startup_commands: ['shell-exec %CARGO_HOME%\bin\gat-gwm.exe']

  # Commands to run just before the WM is shutdown.
  # Example: The below command kills Zebar.
  # shutdown_commands: ["shell-exec taskkill /IM zebar.exe /F"]
  # shutdown_commands: ["shell-exec taskkill /IM yasb.exe /F"]
  shutdown_commands: ['shell-exec taskkill /IM gat-gwm.exe /F']


  focus_follows_cursor: true
  toggle_workspace_on_refocus: false

  cursor_jump:
    enabled: true
    trigger: "monitor_focus"

  # How windows should be hidden when switching workspaces.
  # - 'cloak': Recommended. Hides windows with no animation.
  # - 'hide': Legacy method (v3.5 and earlier) that has a brief animation,
  # but has stability issues with some apps.
  hide_method: "cloak"

  # Affects which windows get shown in the native Windows taskbar. Has no
  # effect if `hide_method: 'hide'`.
  # - 'true': Show all windows (regardless of workspace).
  # - 'false': Only show windows from the currently shown workspaces.
  show_all_in_taskbar: false


gaps:
  inner_gap: "10px"
  outer_gap:
    top: "0px"
    right: "10px"
    bottom: "5px"
    left: "10px"

window_effects:
  focused_window:
    border:
      enabled: true
      color: *ctp-mocha-mauve
    hide_title_bar:
      enabled: false
    corner_style:
      enabled: true
      style: "rounded"
    transparency:
      enabled: true
      opacity: "99.6%"
  other_windows:
    border:
      enabled: true
      color: *ctp-mocha-surface2
    hide_title_bar:
      enabled: false
    corner_style:
      enabled: true
      style: "rounded"
    transparency:
      enabled: true
      opacity: "97%"

window_behavior:
  initial_state: "tiling"
  state_defaults:
    floating:
      centered: true
      shown_on_top: false
    fullscreen:
      maximized: false
      shown_on_top: false

workspaces:
  - name: "1"
    display_name: ""
    keep_alive: true
  - name: "2"
    display_name: ""
    keep_alive: true
  - name: "3"
    display_name: ""
  - name: "4"
    display_name: ""
  - name: "5"
    display_name: ""
  - name: "6"
    display_name: ""
  - name: "7"
    display_name: ""
  - name: "8"
    display_name: ""
  - name: "9"
    display_name: ""

window_rules:
  - commands: ["ignore"]
    match:
      - window_process: { equals: "zebar" }
      - window_title: { regex: "[Pp]icture.in.[Pp]icture" }
        window_class: { regex: "Chrome_WidgetWin_1|MozillaDialogClass" }
      - window_process: { equals: "PowerToys.PowerAccent" }
      - window_process: { equals: "Lively" }
        window_class: { regex: "HwndWrapper*" }
      - window_process: { equals: "msrdc" }
      - window_process: { equals: "Flow.Launcher" }
      - window_process: { equals: "handy" }
      - window_process: { equals: "Ditto" }
      - window_process: { equals: "flemozi" }
      # Steam overlay — unmanaged by the WM
      - window_process: { equals: "GameOverlayUI" }
      # GPG passphrase prompt
      - window_process: { equals: "pinentry" }
      - window_process: { equals: "Openscreen" }
      - window_process: { equals: "Keyboard Sounds" }
      - window_process: { equals: "OnboardMemoryManager" }

binding_modes:
  # Resize mode — activate with Win+R, exit with Esc or Enter
  - name: "resize"
    keybindings:
      - commands: ["resize --width -2%"]
        bindings: ["left", "h"]
      - commands: ["resize --width +2%"]
        bindings: ["right", "l"]
      - commands: ["resize --height +2%"]
        bindings: ["up", "k"]
      - commands: ["resize --height -2%"]
        bindings: ["down", "j"]
      - commands: ["wm-disable-binding-mode --name resize"]
        bindings: ["escape", "enter"]

  # Pause mode — congela todos los keybindings de GlazeWM
  - name: "pause"
    keybindings:
      - commands: ["wm-disable-binding-mode --name pause"]
        bindings: ["lwin+shift+p"]

keybindings:
  # ---------------------------------------------------------------------------
  # Foco — WIN+flechas / WIN+hjkl
  # ---------------------------------------------------------------------------
  - commands: ["focus --direction left"]
    bindings: ["lwin+left", "lwin+h"]
  - commands: ["focus --direction right"]
    bindings: ["lwin+right", "lwin+l"]
  - commands: ["focus --direction up"]
    bindings: ["lwin+up", "lwin+k"]
  - commands: ["focus --direction down"]
    bindings: ["lwin+down", "lwin+j"]

  # ---------------------------------------------------------------------------
  # Mover ventana — WIN+SHIFT+flechas / WIN+SHIFT+hjkl
  # ---------------------------------------------------------------------------
  - commands: ["move --direction left"]
    bindings: ["lwin+shift+left", "lwin+shift+h"]
  - commands: ["move --direction right"]
    bindings: ["lwin+shift+right", "lwin+shift+l"]
  - commands: ["move --direction up"]
    bindings: ["lwin+shift+up", "lwin+shift+k"]
  - commands: ["move --direction down"]
    bindings: ["lwin+shift+down", "lwin+shift+j"]

  # ---------------------------------------------------------------------------
  # WM — general
  # ---------------------------------------------------------------------------
  - commands: ["wm-enable-binding-mode --name resize"]
    bindings: ["lwin+r"]
  - commands: ["wm-enable-binding-mode --name pause"]
    bindings: ["lwin+shift+p"]
  - commands: ["toggle-tiling-direction"]
    bindings: ["lwin+t"]
  - commands: ["wm-cycle-focus"]
    bindings: ["lwin+ctrl+tab"]
  - commands: ["toggle-floating --centered"]
    bindings: ["lwin+shift+space"]
  - commands: ["toggle-fullscreen"]
    bindings: ["lwin+f"]
  - commands: ["toggle-minimized"]
    bindings: ["lwin+m"]
  - commands: ["close"]
    bindings: ["lwin+q"]
  - commands: ["wm-exit"]
    bindings: ["lwin+ctrl+shift+e"]
  - commands: ["wm-reload-config"]
    bindings: ["lwin+shift+r"]
  - commands: ["shell-exec wscript.exe //b //nologo %USERPROFILE%\\.glzr\\glazewm\\scripts\\restart.vbs"]
    bindings: ["lwin+shift+ctrl+r"]
  - commands: ["wm-redraw"]
    bindings: ["lwin+ctrl+shift+w"]
  - commands: ["focus --recent-workspace"]
    bindings: ["lwin+shift+tab"]

  # ---------------------------------------------------------------------------
  # App launchers
  # ---------------------------------------------------------------------------
  - commands: ["shell-exec %LOCALAPPDATA%\\vesktop\\vesktop.exe"]
    bindings: ["lwin+shift+d"]

  # ---------------------------------------------------------------------------
  # Gaming mode — Win+Ctrl+G toggles focused_window border/corner/transparency
  # ---------------------------------------------------------------------------
  - commands: ["shell-exec wscript.exe //b //nologo %USERPROFILE%\\.glzr\\glazewm\\scripts\\toggle-gaming-mode.vbs"]
    bindings: ["lwin+ctrl+g"]

  # ---------------------------------------------------------------------------
  # Workspaces — WIN+1..9 / WIN+SHIFT+1..9
  # ---------------------------------------------------------------------------
  - commands: ["focus --workspace 1"]
    bindings: ["lwin+1"]
  - commands: ["focus --workspace 2"]
    bindings: ["lwin+2"]
  - commands: ["focus --workspace 3"]
    bindings: ["lwin+3"]
  - commands: ["focus --workspace 4"]
    bindings: ["lwin+4"]
  - commands: ["focus --workspace 5"]
    bindings: ["lwin+5"]
  - commands: ["focus --workspace 6"]
    bindings: ["lwin+6"]
  - commands: ["focus --workspace 7"]
    bindings: ["lwin+7"]
  - commands: ["focus --workspace 8"]
    bindings: ["lwin+8"]
  - commands: ["focus --workspace 9"]
    bindings: ["lwin+9"]

  - commands: ["move --workspace 1"]
    bindings: ["lwin+shift+1"]
  - commands: ["move --workspace 2"]
    bindings: ["lwin+shift+2"]
  - commands: ["move --workspace 3"]
    bindings: ["lwin+shift+3"]
  - commands: ["move --workspace 4"]
    bindings: ["lwin+shift+4"]
  - commands: ["move --workspace 5"]
    bindings: ["lwin+shift+5"]
  - commands: ["move --workspace 6"]
    bindings: ["lwin+shift+6"]
  - commands: ["move --workspace 7"]
    bindings: ["lwin+shift+7"]
  - commands: ["move --workspace 8"]
    bindings: ["lwin+shift+8"]
  - commands: ["move --workspace 9"]
    bindings: ["lwin+shift+9"]

  # Navegación relativa — WIN+CTRL+flechas
  - commands: ["focus --next-workspace"]
    bindings: ["lwin+ctrl+right"]
  - commands: ["focus --prev-workspace"]
    bindings: ["lwin+ctrl+left"]

  # ---------------------------------------------------------------------------
  # Apps — WIN+SHIFT+letra
  # ---------------------------------------------------------------------------
  - commands: ["shell-exec alacritty"]
    bindings: ["lwin+enter", "lwin+shift+t"]
  - commands: ["shell-exec brave"]
    bindings: ["lwin+shift+b"]
  - commands: ["shell-exec explorer.exe %USERPROFILE%"]
    bindings: ["lwin+shift+e"]
  - commands: ["shell-exec zed"]
    bindings: ["lwin+shift+c"]
  - commands: ["shell-exec %APPDATA%\\Spotify\\Spotify.exe"]
    bindings: ["lwin+shift+s"]
  - commands: ["shell-exec %LOCALAPPDATA%\\Discord\\Update.exe --processStart Discord.exe"]
    bindings: ["lwin+shift+d"]
  - commands: ["shell-exec explorer shell:AppsFolder\\5319275A.WhatsAppDesktop_cv1g1gvanyjgm!App"]
    bindings: ["lwin+shift+w"]

  # ---------------------------------------------------------------------------
  # Shortcuts de Windows restaurados (deshabilitados por NoWinKeys)
  # ---------------------------------------------------------------------------
  # - commands: ["shell-exec ms-settings:clipboard"]
  #   bindings: ["lwin+v"] # Already managed by Ditto
  - commands: ["shell-exec explorer ms-screenclip:"]
    bindings: ["lwin+shift+z"]
  - commands: ["shell-exec rundll32.exe user32.dll,LockWorkStation"]
    bindings: ["lwin+l"]

  # ---------------------------------------------------------------------------
  # YASB
  # ---------------------------------------------------------------------------
  - commands: ["shell-exec powershell -Command \"Stop-Process -Name yasb -ErrorAction SilentlyContinue; Start-Process yasb\""]
    bindings: ["lwin+shift+q"]

  # ---------------------------------------------------------------------------
  # Audio — NirCmd (descarga: https://www.nirsoft.net/utils/nircmd.html)
  # Coloca nircmd.exe en C:\Windows\System32 o añádelo al PATH
  # ---------------------------------------------------------------------------
  # - commands: ["shell-exec nircmd.exe changesysvolume 5000"]
  #   bindings: ["lwin+shift+up"]
  # - commands: ["shell-exec nircmd.exe changesysvolume -5000"]
  #   bindings: ["lwin+shift+down"]
  # - commands: ["shell-exec nircmd.exe mutesysvolume 2"]
  #   bindings: ["lwin+shift+m"]
  # - commands: ["shell-exec nircmd.exe mutemicinput 2"]
  #   bindings: ["lwin+shift+i"]
  # - commands: ["shell-exec nircmd.exe mutemute 2"]
  #   bindings: ["lwin+shift+m"]
